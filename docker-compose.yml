version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: nextblog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nextblog}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nextblog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nextblog}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  nextblog_data:
